// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.13.0'
        classpath 'com.google.gms:google-services:4.4.4'

        // NOTE: Do not place your application dependencies here; they belong
        // in the individual module build.gradle files
    }
}

apply from: "variables.gradle"

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

def nodeModulesDir = new File(rootDir.parentFile, "node_modules").canonicalFile
subprojects { subproject ->
    if (subproject.projectDir.canonicalPath.startsWith(nodeModulesDir.canonicalPath)) {
        subproject.layout.buildDirectory.set(
            rootProject.layout.buildDirectory.dir("node-modules/${subproject.name}")
        )
    }
}

task clean(type: Delete) {
    delete rootProject.buildDir
}
